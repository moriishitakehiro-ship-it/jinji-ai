<html lang="ja">
<head>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(61, 77, 160, 0.14);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e7ebf8;
    }

    .header {
      background: linear-gradient(135deg, #6d7cff, #8f6bff);
      color: white;
      padding: 12px 16px 10px;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .title-wrap p {
      margin: 4px 0 0;
      font-size: 12px;
      opacity: 0.92;
      line-height: 1.5;
    }

    .score-board {
      min-width: 170px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: visible;
    }

    .score-label {
      font-size: 10px;
      opacity: 0.9;
      margin-bottom: 2px;
      color: #e8edff;
    }

    .score-value {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
      letter-spacing: 0.02em;
      color: #ffe58f;
    }

    .score-sub {
      margin-top: 2px;
      font-size: 10px;
      opacity: 0.85;
      color: #dbe3ff;
      line-height: 1.4;
    }

    .point-pop {
      position: absolute;
      right: 10px;
      top: 6px;
      font-size: 12px;
      font-weight: bold;
      color: #fff6c2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(0.95);
    }

    .point-pop.show {
      animation: pointFloat 1.4s ease forwards;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background:
        radial-gradient(circle at top right, rgba(143, 107, 255, 0.06), transparent 25%),
        linear-gradient(180deg, #fbfcff 0%, #f6f8ff 100%);
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
      animation: fadeInUp 0.25s ease;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .message-row.system {
      justify-content: flex-start;
    }

    .message-wrap {
      max-width: 78%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .message-row.user .message-wrap {
      align-items: flex-end;
    }

    .bubble {
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      min-width: 72px;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: normal;
      overflow-wrap: break-word;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
    }

    .user .bubble {
      background: linear-gradient(135deg, #6d7cff, #5c6df5);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .bot .bubble {
      background: #fff;
      color: #333;
      border: 1px solid #e7eaf4;
      border-bottom-left-radius: 6px;
    }

    .thinking-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #7b839d;
      padding: 2px 4px;
      text-align: left;
    }

    .thinking-dots {
      display: inline-flex;
      gap: 4px;
    }

    .thinking-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8d97bd;
      animation: blink 1.2s infinite;
      opacity: 0.4;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .meta {
      font-size: 10px;
      color: #8a90a6;
      margin-top: 5px;
      padding: 0 4px;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      background: linear-gradient(135deg, #fff3cd, #ffe8a3);
      color: #8a6500;
      border: 1px solid #ffe08a;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(255, 193, 7, 0.18);
    }

    .input-area {
      border-top: 1px solid #e8ebf5;
      background: #fff;
      padding: 12px;
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      height: 50px;
      min-height: 50px;
      max-height: 50px;
      resize: none;
      overflow-y: hidden;
      border: 1px solid #dbe1f0;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fafbff;
      line-height: 1.6;
      white-space: nowrap;
      word-break: normal;
      overflow-x: auto;
      overflow-wrap: normal;
    }

    textarea:focus {
      border-color: #7d89ff;
      box-shadow: 0 0 0 4px rgba(109, 124, 255, 0.12);
      background: #fff;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: inherit;
    }

    .send-btn {
      background: linear-gradient(135deg, #6d7cff, #5d6cf8);
      color: white;
      min-width: 84px;
      box-shadow: 0 10px 22px rgba(109, 124, 255, 0.25);
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(109, 124, 255, 0.32);
    }

    .send-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .sub-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .sub-btn {
      background: #f3f5ff;
      color: #5160d8;
      border: 1px solid #dde4ff;
      padding: 10px 12px;
      font-size: 12px;
    }

    .sub-btn:hover {
      background: #eaf0ff;
    }

    @keyframes blink {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.35;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pointFloat {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.92);
      }
      20% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      75% {
        opacity: 1;
        transform: translateY(-14px) scale(1.02);
      }
      100% {
        opacity: 0;
        transform: translateY(-24px) scale(1.04);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        height: 94vh;
        border-radius: 16px;
      }

      .message-wrap {
        max-width: 88%;
      }

      .title-wrap h1 {
        font-size: 16px;
      }

      .title-wrap p {
        font-size: 11px;
      }

      .score-board {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>

そこにモヤっとできている時点で、かなり大事なセンスがあります。
やるやんポイント　どうぞ。`,
`会議がうまく終わったように見えて動かないときは、合意ではなく雰囲気で閉じていることがあります。
その場の満足度は高いのに、実務の接続が弱いパターンですね。
その違いを感じ取れているのは、かなり観察力があります。
やるやんポイント　追加です。`
        ]
      },
      {
        keywords: ["残業", "忙しい", "業務量", "回らない", "工数"],
        replies: [
`忙しさが続くと、目の前を回すことが最優先になって、何が重いのか見えなくなりますよね。
でも“全部が忙しい”の中にも、質の違う負荷が混ざっていることがあります。
工数の問題なのか、進め方の問題なのか、期待値の問題なのかを分けて見ようとする視点はかなり大事です。
そこまで考えているのは偉いです。
やるやんポイント　ゲットだよ！`,
`業務量が多いときって、単に件数の話だけではなく、切り替え回数や詰めの多さが効いていることもあります。
数字で見えにくい疲れ方をしている可能性もありますね。
“回らない”をちゃんと違和感として捉えられているのは、かなり良いです。
やるやんポイント　進呈します。`,
`残業が増えてくると、自分の頑張りが足りないせいにしがちですが、設計の問題も普通にあります。
全部を根性の話にしない感覚はかなり大事です。
しんどさを雑に処理せず、原因を見ようとしている時点で、だいぶやるやんです。
やるやんポイント　どうぞ。`
        ]
      },
      {
        keywords: ["報連相", "連携", "共有", "伝わらない"],
        replies: [
`連携がうまくいかないときって、“伝えたかどうか”より“同じ絵を見ていたかどうか”の差が出ますよね。
共有したつもりでも、解釈がバラけていることはよくあります。
そのズレを違和感として拾えているのはかなり良いです。
やるやんポイント　ゲットだよ！`,
`報連相が足りないのか、報連相の形だけ残っているのかで、話は少し変わってきますよね。
情報の量より、受け手が動ける形になっているかが意外と大きいです。
そこにモヤっとできているのは、かなり筋がいいです。
やるやんポイント　追加です。`,
`“ちゃんと伝えたはずなのに伝わっていない”は、かなりあるあるです。
内容ではなく、タイミングや文脈の共有が足りていないのかもしれません。
その辺を丁寧に見ようとしている時点で、かなりやるやんです。
やるやんポイント　どうぞ。`
        ]
      },
      {
        keywords: ["モチベ", "やる気", "気持ちが乗らない", "やる気が出ない"],
        replies: [
`やる気が出ないときって、怠けではなく、納得感の不足だったりしますよね。
気持ちの問題に見えて、実は意味づけの問題かもしれません。
そのズレに気づけているだけでも、かなり大事です。
やるやんポイント　ゲットだよ！`,
`モチベーションって、上げようとすると逃げるのに、納得すると少し戻ることがありますよね。
今の状態を根性不足で片づけず、何に引っかかっているか見ようとしているならかなり良いです。
その感覚、かなりやるやんです。
やるやんポイント　進呈します。`,
`気持ちが乗らないときに、自分を責めるルートに入るとしんどいですよね。
でも実際は、疲労・役割・意味づけが混ざっていることも多いです。
そこを雑にせず見ようとしているのは偉いです。
やるやんポイント　追加です。`
        ]
      }
    ];

    const thinkingMessages = [
      "考え中…",
      "人事部の気持ちで考え中…",
      "日本テレビの歴史をひも解いて考え中…",
      "組織と個人のはざまで考え中…",
      "評価と納得感のバランスを考え中…",
      "人事っぽい角度から深くうなずきつつ考え中…",
      "関係者全員の顔を思い浮かべながら考え中…",
      "それっぽい解像度を上げながら考え中…",
      "会議室の空気を再現しつつ考え中…",
      "なんとなく深いことを言う準備中…"
    ];

    const scoreComments = [
      "本日のがんばりを静かに評価中",
      "人事的観点から加点中",
      "やるやんの波を観測中",
      "相談の深みをポイント換算中",
      "地味に良い視点を集計中",
      "納得感をそれっぽく数値化中"
    ];

    function insertSample(text) {
      userInput.value = text;
      userInput.focus();
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function createMessage(role, text, showBadge = false, pointGain = 0) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const wrap = document.createElement("div");
      wrap.className = "message-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = text.replace(/\n/g, "<br>");
      wrap.appendChild(bubble);

      if (showBadge) {
        const badge = document.createElement("div");
        badge.className = "badge";
        badge.textContent = `やるやんポイント　＋${pointGain}`;
        wrap.appendChild(badge);
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = role === "user" ? "あなた" : "AIチャットボット";
      wrap.appendChild(meta);

      row.appendChild(wrap);
      chatArea.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function createThinkingMessage(text) {
      const row = document.createElement("div");
      row.className = "message-row system";

      const thinking = document.createElement("div");
      thinking.className = "thinking-text";
      thinking.innerHTML = `
        <span>${text}</span>
        <span class="thinking-dots">
          <span></span><span></span><span></span>
        </span>
      `;

      row.appendChild(thinking);
      chatArea.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;

      return row;
    }

    function generateGenericReply() {
      return [
        pick(openings),
        pick(middles),
        pick(vagueAdvice),
        pick(endings)
      ].join("\n");
    }

    function generateReply(input) {
      const lower = input.toLowerCase();

      const matchedGroups = keywordReplyGroups.filter(group =>
        group.keywords.some(keyword => lower.includes(keyword.toLowerCase()))
      );

      if (matchedGroups.length > 0) {
        const selectedGroup = pick(matchedGroups);
        return pick(selectedGroup.replies);
      }

      if (lower.includes("どう思う") || lower.includes("どうしたら") || lower.includes("どうすれば")) {
        return [
          pick(openings),
          "“どう動くか”の前に、“何にいちばん引っかかっているか”を見た方がよさそうな気もします。",
          pick(vagueAdvice),
          pick(endings)
        ].join("\n");
      }

      if (lower.includes("つらい") || lower.includes("きつい") || lower.includes("しんど")) {
        return [
          "それは、静かに負荷が積み上がっている感じがしますね。",
          "こういう時は、気持ちの話に見えて、役割や関係性の話が混ざっていることもあります。",
          "まずは何が一番しんどいのかを分けて見るだけでも少し違うかもしれません。",
          pick(endings)
        ].join("\n");
      }

      return generateGenericReply();
    }

    async function runThinkingSequence() {
      const count = 2 + Math.floor(Math.random() * 2);
      const used = [];
      let currentRow = null;

      for (let i = 0; i < count; i++) {
        let msg;
        do {
          msg = pick(thinkingMessages);
        } while (used.includes(msg) && used.length < thinkingMessages.length);

        used.push(msg);

        if (currentRow) {
          currentRow.remove();
        }

        currentRow = createThinkingMessage(msg);

        const wait = 1100 + Math.random() * 1100;
        await new Promise(resolve => setTimeout(resolve, wait));
      }

      if (currentRow) {
        currentRow.remove();
      }
    }

    function showPointPopup(pointGain) {
      const pop = document.createElement("div");
      pop.className = "point-pop";
      pop.textContent = `+${pointGain} pt`;
      scoreBoard.appendChild(pop);

      requestAnimationFrame(() => {
        pop.classList.add("show");
      });

      setTimeout(() => {
        pop.remove();
      }, 1450);
    }

    function updatePoints(pointGain) {
      totalPoints += pointGain;
      totalPointsEl.textContent = totalPoints;
      scoreSub.textContent = `${pick(scoreComments)}　（今回＋${pointGain}）`;
      showPointPopup(pointGain);
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      createMessage("user", text);
      userInput.value = "";
      sendBtn.disabled = true;
      userInput.disabled = true;

      await runThinkingSequence();

      const reply = generateReply(text);
      const pointGain = 1 + Math.floor(Math.random() * 3);
      updatePoints(pointGain);
      createMessage("bot", reply, true, pointGain);

      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }

    function clearChat() {
      chatArea.innerHTML = "";
      totalPoints = 0;
      totalPointsEl.textContent = "0";
      scoreSub.textContent = "本日のがんばりを静かに評価中";
      userInput.value = "";
      sendBtn.disabled = false;
      userInput.disabled = false;
      document.querySelectorAll(".point-pop").forEach(el => el.remove());
      userInput.focus();
    }

    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener("paste", function () {
      setTimeout(() => {
        userInput.scrollLeft = userInput.scrollWidth;
      }, 0);
    });
  </script>
</body>
